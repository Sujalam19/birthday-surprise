<!DOCTYPE html>

<head>
<title>Naughty Surprise 😜</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    background: linear-gradient(45deg,#ff416c,#ff4b2b);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    font-family:sans-serif;
    overflow:hidden;
    color:white;
}

img {
    width:300px;
    border-radius:20px;
    box-shadow:0 0 40px pink;
    animation: zoom 2s infinite alternate;
}

@keyframes zoom {
    from {transform: scale(1);}
    to {transform: scale(1.1);}
}

h2 {
    margin-top:20px;
    animation: shake 1s infinite;
}

@keyframes shake {
    0% {transform:translateX(0);}
    25% {transform:translateX(5px);}
    50% {transform:translateX(-5px);}
    75% {transform:translateX(5px);}
    100% {transform:translateX(0);}
}
</style>

</head>

<body>

<img src="/img8.jpg" alt="Naughty Surprise">

<h2>Ye Smile Maar Daalegi 😜💋</h2>

<audio autoplay loop>
    <source src="/music.m4a" type="audio/mp3">
</audio>

<a href="/final" style="color:white;font-size:20px;">Final Surprise ➜</a>
</body>
</html>
